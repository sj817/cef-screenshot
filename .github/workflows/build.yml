# CI 构建检查 — 验证各平台可以正常编译
# 触发条件：推送到 main / PR / 手动触发 / 被 release.yml 调用

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── Windows ────────────────────────────────────────────────
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cef_platform: windows64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cef_platform: windowsarm64

          # ── Linux ──────────────────────────────────────────────────
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cef_platform: linux64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            cef_platform: linuxarm64
          - host: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++
            cross_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cross_arch: arm

          # ── macOS ──────────────────────────────────────────────────
          - host: macos-latest
            target: x86_64-apple-darwin
            cef_platform: macosx64
          - host: macos-latest
            target: aarch64-apple-darwin
            cef_platform: macosarm64

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: 缓存 Rust 编译产物
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev ninja-build ${{ matrix.settings.cross_pkg }}
          # 输出交叉编译器版本用于诊断
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            echo "--- Cross compiler versions ---"
            ${{ matrix.settings.cross_cc }} --version
            ${{ matrix.settings.cross_cxx }} --version
          fi

      # ── Linux ARM 交叉编译 libpng ────────────────────────────────
      - name: 构建交叉编译 libpng（Linux ARM）
        if: matrix.settings.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          # 1) 交叉编译 zlib（libpng 依赖）
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          CC=${{ matrix.settings.cross_cc }} ./configure --prefix=/tmp/libpng-cross --static
          make -j$(nproc)
          make install
          cd ..
          # 2) 交叉编译 libpng
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.settings.cross_cc }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.settings.cross_arch }} \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-cross \
            -DCMAKE_PREFIX_PATH=/tmp/libpng-cross \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF -DPNG_SHARED=OFF
          cmake --build build
          cmake --install build

      # ── macOS 系统依赖 ──────────────────────────────────────────
      - name: 安装 macOS 系统依赖
        if: runner.os == 'macOS'
        run: |
          for pkg in ninja libpng; do
            brew list "$pkg" &>/dev/null || brew install "$pkg"
          done

      # ── macOS x86_64 交叉编译 libpng ────────────────────────────
      - name: 构建 x86_64 libpng（macOS 交叉编译）
        if: matrix.settings.target == 'x86_64-apple-darwin'
        run: |
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-x86_64 \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF
          cmake --build build
          cmake --install build

      # ── Node.js 依赖 ───────────────────────────────────────────
      - name: 安装 Node.js 依赖
        run: pnpm install --frozen-lockfile

      # ── CEF 缓存 + 构建 C++ Helper ─────────────────────────────
      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.settings.cef_platform }}/cef
          key: cef-${{ matrix.settings.cef_platform }}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup:cpp -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 输出构建错误（失败时）
        if: failure()
        run: |
          echo "## 构建日志（最后 200 行）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/cef-build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # 同时创建一个包含错误日志的 gist（可通过 API 公开获取）
          echo "=== Last 50 lines of build log ==="
          tail -50 /tmp/cef-build.log 2>/dev/null || echo "No build log found"
          # 将关键错误行输出为 GitHub 注解
          if [ -f /tmp/cef-build.log ]; then
            grep -i "error\|fatal\|failed\|undefined reference\|no such file" /tmp/cef-build.log | tail -20 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
        shell: bash

      - name: 上传构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.settings.target }}
          path: /tmp/cef-build.log
          if-no-files-found: ignore

      # ── 构建 Rust Napi 绑定 ────────────────────────────────────
      - name: 构建 Rust Napi 绑定
        run: |
          # 设置 Linux 交叉编译链接器
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            target_env=$(echo "${{ matrix.settings.target }}" | tr - _)
            export "CC_${target_env}=${{ matrix.settings.cross_cc }}"
            export "CXX_${target_env}=${{ matrix.settings.cross_cxx }}"
            export "CARGO_TARGET_$(echo $target_env | tr '[:lower:]' '[:upper:]')_LINKER=${{ matrix.settings.cross_cc }}"
          fi
          pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --js cef-screenshot.cjs
        shell: bash

      # ── 打包 CEF 运行时归档 ────────────────────────────────────
      - name: 打包 CEF 运行时归档
        run: pnpm run pack:runtime -- --target=${{ matrix.settings.target }}
        shell: bash

      # ── 上传产物 ───────────────────────────────────────────────
      - name: 上传 .node 产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error

      - name: 上传 CEF 运行时归档
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.settings.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # 包安装测试 — 在 Docker 容器中验证 Linux 平台
  # ═══════════════════════════════════════════════════════════════════════════
  test-linux:
    name: Test ${{ matrix.name }}
    needs: build
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux x64 (Ubuntu 22.04)"
            runner: ubuntu-latest
            container: "ubuntu:22.04"
            target: x86_64-unknown-linux-gnu
            npm_suffix: linux-x64-gnu
          - name: "Linux x64 (Ubuntu 24.04)"
            runner: ubuntu-latest
            container: "ubuntu:24.04"
            target: x86_64-unknown-linux-gnu
            npm_suffix: linux-x64-gnu
          - name: "Linux x64 (Debian 12)"
            runner: ubuntu-latest
            container: "debian:bookworm"
            target: x86_64-unknown-linux-gnu
            npm_suffix: linux-x64-gnu
          - name: "Linux ARM64 (Ubuntu 24.04)"
            runner: ubuntu-24.04-arm
            container: "ubuntu:24.04"
            target: aarch64-unknown-linux-gnu
            npm_suffix: linux-arm64-gnu

    steps:
      - name: 安装容器依赖
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git xz-utils

      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 下载 .node 绑定
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ./

      - name: 下载 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          name: runtime-${{ matrix.target }}
          path: ./dist/

      - name: 构建并安装测试包
        shell: bash
        env:
          npm_config_engine_strict: "false"
        run: |
          set -eox pipefail
          NPM_SUFFIX="${{ matrix.npm_suffix }}"
          echo "[info] npm_suffix=${NPM_SUFFIX}"
          echo "[info] node=$(node -v), npm=$(npm -v)"
          echo "[info] pwd=$(pwd)"

          echo ">>> Step 1: 复制 .node 绑定和 CEF 运行时"
          cp *.node "npm/${NPM_SUFFIX}/"
          tar -xzf dist/cef-screenshot-runtime-${NPM_SUFFIX}-v*.tar.gz -C "npm/${NPM_SUFFIX}/"
          chmod +x "npm/${NPM_SUFFIX}/cef_screenshot_helper" 2>/dev/null || true
          echo "=== 子包内容 ==="
          ls -la "npm/${NPM_SUFFIX}/" | head -20

          echo ">>> Step 2: npm pack 子包"
          cd "npm/${NPM_SUFFIX}"
          npm pack --loglevel=verbose 2>&1
          SUB_TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -z "${SUB_TARBALL}" ]; then echo "ERROR: sub-package npm pack produced no tarball"; ls -la; exit 1; fi
          echo "[info] sub tarball: ${SUB_TARBALL} ($(du -h "${SUB_TARBALL}" | cut -f1))"
          mv "${SUB_TARBALL}" /tmp/
          cd ../..

          echo ">>> Step 3: npm pack 主包"
          npm pack --loglevel=verbose 2>&1
          MAIN_TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -z "${MAIN_TARBALL}" ]; then echo "ERROR: main package npm pack produced no tarball"; ls -la; exit 1; fi
          echo "[info] main tarball: ${MAIN_TARBALL} ($(du -h "${MAIN_TARBALL}" | cut -f1))"
          mv "${MAIN_TARBALL}" /tmp/

          echo ">>> Step 4: npm install"
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          echo '{"name":"test-install","private":true}' > package.json
          echo 'engine-strict=false' > .npmrc
          npm install "/tmp/${SUB_TARBALL}" "/tmp/${MAIN_TARBALL}" --loglevel=verbose 2>&1

          echo ""
          echo "=== node_modules 顶层 ==="
          ls node_modules/
          echo "=== cef-screenshot 子包文件 ==="
          ls "node_modules/cef-screenshot-${NPM_SUFFIX}/" | head -20

      - name: 验证包安装
        shell: bash
        run: |
          cd /tmp/test-project
          node -e "
            const { existsSync } = require('fs');
            const { dirname, join } = require('path');

            // 1. 加载原生绑定
            const binding = require('cef-screenshot/cef-screenshot.cjs');
            console.log('✅ 原生绑定加载成功');
            console.log('   导出:', Object.keys(binding));

            // 2. 验证导出函数
            for (const fn of ['init', 'screenshot', 'shutdown']) {
              if (typeof binding[fn] !== 'function')
                throw new Error('缺少导出函数: ' + fn);
            }
            console.log('✅ 所有导出函数存在');

            // 3. 检查 CEF helper 二进制
            const suffix = '${{ matrix.npm_suffix }}';
            const pkgDir = dirname(require.resolve('cef-screenshot-' + suffix + '/package.json'));
            const helperPath = join(pkgDir, 'cef_screenshot_helper');
            if (!existsSync(helperPath)) {
              throw new Error('CEF helper 不存在: ' + helperPath);
            }
            console.log('✅ CEF helper 二进制文件存在');

            console.log('\n✅ 包安装验证全部通过！');
          "

      - name: 输出调试信息（失败时）
        if: failure()
        shell: bash
        run: |
          echo "## 测试失败调试信息" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "=== npm 日志 ===" >> "$GITHUB_STEP_SUMMARY"
          cat ~/.npm/_logs/*.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No npm logs found" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== /tmp/test-project 内容 ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la /tmp/test-project/ >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No test-project dir" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== /tmp/test-project/node_modules ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la /tmp/test-project/node_modules/ >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No node_modules" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== /tmp/*.tgz 文件 ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la /tmp/*.tgz >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No tgz files in /tmp" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # 包安装测试 — 原生运行器（Windows / macOS）
  # ═══════════════════════════════════════════════════════════════════════════
  test-native:
    name: Test ${{ matrix.name }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Windows x64"
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            npm_suffix: win32-x64-msvc
            helper_name: cef_screenshot_helper.exe
          - name: "macOS ARM64"
            runner: macos-latest
            target: aarch64-apple-darwin
            npm_suffix: darwin-arm64
            helper_name: cef_screenshot_helper

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 下载 .node 绑定
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ./

      - name: 下载 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          name: runtime-${{ matrix.target }}
          path: ./dist/

      - name: 构建并安装测试包
        shell: bash
        env:
          npm_config_engine_strict: "false"
        run: |
          set -eox pipefail
          NPM_SUFFIX="${{ matrix.npm_suffix }}"
          echo "[info] npm_suffix=${NPM_SUFFIX}"
          echo "[info] node=$(node -v), npm=$(npm -v)"
          echo "[info] RUNNER_TEMP=$RUNNER_TEMP"
          echo "[info] pwd=$(pwd)"

          echo ">>> Step 1: 复制 .node 绑定和 CEF 运行时"
          cp *.node "npm/${NPM_SUFFIX}/"
          tar -xzf dist/cef-screenshot-runtime-${NPM_SUFFIX}-v*.tar.gz -C "npm/${NPM_SUFFIX}/"
          chmod +x "npm/${NPM_SUFFIX}/${{ matrix.helper_name }}" 2>/dev/null || true
          echo "=== 子包内容 ==="
          ls -la "npm/${NPM_SUFFIX}/" | head -20

          echo ">>> Step 2: npm pack 子包"
          cd "npm/${NPM_SUFFIX}"
          npm pack --loglevel=verbose 2>&1
          SUB_TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -z "${SUB_TARBALL}" ]; then echo "ERROR: sub-package npm pack produced no tarball"; ls -la; exit 1; fi
          echo "[info] sub tarball: ${SUB_TARBALL} ($(du -h "${SUB_TARBALL}" | cut -f1))"
          mv "${SUB_TARBALL}" "$RUNNER_TEMP/"
          cd ../..

          echo ">>> Step 3: npm pack 主包"
          npm pack --loglevel=verbose 2>&1
          MAIN_TARBALL=$(ls *.tgz 2>/dev/null | head -1)
          if [ -z "${MAIN_TARBALL}" ]; then echo "ERROR: main package npm pack produced no tarball"; ls -la; exit 1; fi
          echo "[info] main tarball: ${MAIN_TARBALL} ($(du -h "${MAIN_TARBALL}" | cut -f1))"
          mv "${MAIN_TARBALL}" "$RUNNER_TEMP/"

          echo ">>> Step 4: npm install"
          TEST_DIR="$RUNNER_TEMP/test-project"
          mkdir -p "$TEST_DIR"
          cd "$TEST_DIR"
          echo '{"name":"test-install","private":true}' > package.json
          echo 'engine-strict=false' > .npmrc
          npm install "$RUNNER_TEMP/${SUB_TARBALL}" "$RUNNER_TEMP/${MAIN_TARBALL}" --loglevel=verbose 2>&1

          echo ""
          echo "=== node_modules 顶层 ==="
          ls node_modules/
          echo "=== cef-screenshot 子包文件 ==="
          ls "node_modules/cef-screenshot-${NPM_SUFFIX}/" | head -20

      - name: 验证包安装
        shell: bash
        run: |
          cd "$RUNNER_TEMP/test-project"
          node -e "
            const { existsSync } = require('fs');
            const { dirname, join } = require('path');

            // 1. 加载原生绑定
            const binding = require('cef-screenshot/cef-screenshot.cjs');
            console.log('✅ 原生绑定加载成功');
            console.log('   导出:', Object.keys(binding));

            // 2. 验证导出函数
            for (const fn of ['init', 'screenshot', 'shutdown']) {
              if (typeof binding[fn] !== 'function')
                throw new Error('缺少导出函数: ' + fn);
            }
            console.log('✅ 所有导出函数存在');

            // 3. 检查 CEF helper 二进制
            const suffix = '${{ matrix.npm_suffix }}';
            const pkgDir = dirname(require.resolve('cef-screenshot-' + suffix + '/package.json'));
            const helperName = '${{ matrix.helper_name }}';
            const helperPath = join(pkgDir, helperName);
            if (!existsSync(helperPath)) {
              throw new Error('CEF helper 不存在: ' + helperPath);
            }
            console.log('✅ CEF helper 二进制文件存在');

            console.log('\n✅ 包安装验证全部通过！');
          "

      - name: 输出调试信息（失败时）
        if: failure()
        shell: bash
        run: |
          echo "## 测试失败调试信息" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          TEST_DIR="$RUNNER_TEMP/test-project"
          echo "=== npm 日志 ===" >> "$GITHUB_STEP_SUMMARY"
          cat ~/.npm/_logs/*.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No npm logs found" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== test-project 内容 ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la "$TEST_DIR/" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No test-project dir" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== node_modules ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la "$TEST_DIR/node_modules/" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No node_modules" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "=== tgz 文件 ===" >> "$GITHUB_STEP_SUMMARY"
          ls -la "$RUNNER_TEMP/"*.tgz >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No tgz files" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════════════════
  # 产物结构验证 — 无法原生运行的交叉编译目标
  # ═══════════════════════════════════════════════════════════════════════════
  test-structural:
    name: Verify ${{ matrix.target }} (structural)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-pc-windows-msvc
            npm_suffix: win32-arm64-msvc
            helper_name: cef_screenshot_helper.exe
          - target: armv7-unknown-linux-gnueabihf
            npm_suffix: linux-arm-gnueabihf
            helper_name: cef_screenshot_helper
          - target: x86_64-apple-darwin
            npm_suffix: darwin-x64
            helper_name: cef_screenshot_helper

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 下载 .node 绑定
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: ./bindings/

      - name: 下载 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          name: runtime-${{ matrix.target }}
          path: ./dist/

      - name: 验证产物结构
        shell: bash
        run: |
          set -euo pipefail

          echo "=== .node 绑定 ==="
          ls -la bindings/
          NODE_FILE=$(ls bindings/*.node)
          echo "✅ .node 文件存在: ${NODE_FILE}"
          FILE_SIZE=$(stat -c%s "$NODE_FILE" 2>/dev/null || stat -f%z "$NODE_FILE")
          echo "   大小: $((FILE_SIZE / 1024)) KB"

          echo ""
          echo "=== CEF 运行时归档 ==="
          TARBALL=$(ls dist/*.tar.gz)
          echo "归档: ${TARBALL}"
          TARBALL_SIZE=$(stat -c%s "$TARBALL" 2>/dev/null || stat -f%z "$TARBALL")
          echo "大小: $((TARBALL_SIZE / 1024 / 1024)) MB"

          # 解压并检查结构
          mkdir -p /tmp/runtime-check
          tar -xzf "${TARBALL}" -C /tmp/runtime-check/
          echo ""
          echo "=== 运行时内容 ==="
          ls -la /tmp/runtime-check/ | head -30

          # 验证 helper 和关键文件存在
          HELPER="/tmp/runtime-check/${{ matrix.helper_name }}"
          if [ ! -f "$HELPER" ]; then
            echo "❌ CEF helper 不存在: ${{ matrix.helper_name }}"
            exit 1
          fi
          echo "✅ CEF helper 存在: ${{ matrix.helper_name }}"

          # 验证子包 package.json 结构
          PKG="npm/${{ matrix.npm_suffix }}/package.json"
          if [ ! -f "$PKG" ]; then
            echo "❌ 子包 package.json 不存在: $PKG"
            exit 1
          fi
          echo "✅ 子包 package.json 存在"

          echo ""
          echo "✅ 产物结构验证通过！"
