# .github/workflows/build.yml
# PR / commit 构建检查 — 验证各平台可以正常编译
#
# 覆盖平台（CEF 146 全部受支持架构）：
#   Windows  x64 / ARM64（交叉编译）
#   Linux    x64 / ARM64（交叉编译）/ ARMv7（交叉编译）
#   macOS    x64 / ARM64

name: Build

on:
  workflow_call:
  workflow_dispatch:

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"

jobs:
  build-windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            cef_platform: windows64
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            label: windows-aarch64
            cef_platform: windowsarm64

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 设置 Node 和 Pnpm
        uses: puniyu/setup-node@main
        with:
          node-version: '22'
          pnpm-version: '9'
          cache: true

      - name: 设置 rust
        uses: puniyu/setup-rust@main
        with:
          target: ${{ matrix.platform.target }}
          cache: true

      - name: 设置 Cmake 和 ninja
        uses: lukka/get-cmake@latest

      - name: 安装依赖
        shell: bash
        run: |
          pnpm install

      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.platform.cef_platform }}/cef
          key: cef-${{ matrix.platform.cef_platform}}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: pnpm run setup -- --target=${{ matrix.platform.target }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: pnpm run setup:cpp -- --target=${{ matrix.platform.target }}

      - name: 构建 Rust Napi 绑定
        shell: bash
        run: pnpm exec napi build --platform --release --target ${{ matrix.platform.target }} --js cef-screenshot.cjs

      - name: 类型检查
        run: pnpm run typecheck

      - name: 运行基础测试（仅本机平台）
        if: ${{ matrix.platform.target == 'x86_64-pc-windows-msvc' }}
        shell: bash
        run: pnpm run test
        timeout-minutes: 5

      - name: 上传 构建 产物
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform.label }}
          path: "*.node"
          retention-days: 7

  build-linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            cef_platform: linux64
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            cef_platform: linuxarm64
            cross_cc: aarch64-linux-gnu-gcc
            cross_cxx: aarch64-linux-gnu-g++
          - runner: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            label: linux-armhf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 设置 Node 和 Pnpm
        uses: puniyu/setup-node@main
        with:
          node-version: '22'
          pnpm-version: '9'
          cache: true

      - name: 设置 rust
        uses: puniyu/setup-rust@main
        with:
          target: ${{ matrix.platform.target }}
          cache: true

      - name: 设置 Cmake 和 ninja
        uses: lukka/get-cmake@latest

      - name: 配置 libpng
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libpng-dev ninja-build

      - name: 配置 gcc
        if: ${{ matrix.platform.target == 'x86_64-unknown-linux-gnu' }}
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential

      - name: 配置 gcc
        if: ${{ matrix.platform.target == 'aarch64-unknown-linux-gnu' }}
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: 配置 gcc
        if: ${{ matrix.platform.target == 'armv7-unknown-linux-gnueabihf' }}
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: 安装依赖
        shell: bash
        run: |
          pnpm install

      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.platform.cef_platform }}/cef
          key: cef-${{ matrix.platform.cef_platform}}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        shell: bash
        run: pnpm run setup -- --target=${{ matrix.platform.target }}
        env:
          CC:  ${{ matrix.platform.cross_cc }}
          CXX: ${{ matrix.platform.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        shell: bash
        run: pnpm run setup:cpp -- --target=${{ matrix.platform.target }}
        env:
          CC:  ${{ matrix.platform.cross_cc }}
          CXX: ${{ matrix.platform.cross_cxx }}

      - name: 构建 Rust Napi 绑定
        shell: bash
        run: pnpm exec napi build --platform --release --target ${{ matrix.platform.target }} --js cef-screenshot.cjs

      - name: 类型检查
        run: pnpm run typecheck

      - name: 运行基础测试
        if: ${{ matrix.platform.target == 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: pnpm run test
        timeout-minutes: 5

      - name: 上传 构建 产物
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform.label }}
          path: "*.node"
          retention-days: 7

  build-macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            cef_platform: macosx64
          - runner: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
            cef_platform: macosarm64

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 设置 Node 和 Pnpm
        uses: puniyu/setup-node@main
        with:
          node-version: '22'
          pnpm-version: '9'
          cache: true

      - name: 设置 rust
        uses: puniyu/setup-rust@main
        with:
          target: ${{ matrix.platform.target }}
          cache: true

      - name: 设置 Cmake 和 ninja
        uses: lukka/get-cmake@latest

      - name: 配置 libpng
        uses: ConorMacBride/install-package@v1
        with:
          brew: libpng

      - name: 安装依赖
        shell: bash
        run: |
          pnpm install

      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.platform.cef_platform }}/cef
          key: cef-${{ matrix.platform.cef_platform}}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        shell: bash
        run: pnpm run setup -- --target=${{ matrix.platform.target }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        shell: bash
        run: pnpm run setup:cpp -- --target=${{ matrix.platform.target }}

      - name: 构建 Rust Napi 绑定
        shell: bash
        run: pnpm exec napi build --platform --release --target ${{ matrix.platform.target }} --js cef-screenshot.cjs

      - name: 类型检查
        run: pnpm run typecheck

      - name: 运行基础测试
        shell: bash
        run: pnpm run test
        timeout-minutes: 5

      - name: 上传 构建 产物
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.platform.label }}
          path: "*.node"
          retention-days: 7
