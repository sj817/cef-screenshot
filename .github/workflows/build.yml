# CI 构建检查 — 验证各平台可以正常编译
# 触发条件：推送到 main / PR / 手动触发 / 被 release.yml 调用

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── Windows ────────────────────────────────────────────────
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cef_platform: windows64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cef_platform: windowsarm64

          # ── Linux ──────────────────────────────────────────────────
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cef_platform: linux64
          - host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cef_platform: linuxarm64
            cross_cc: aarch64-linux-gnu-gcc
            cross_cxx: aarch64-linux-gnu-g++
            cross_pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - host: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++
            cross_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

          # ── macOS ──────────────────────────────────────────────────
          - host: macos-latest
            target: x86_64-apple-darwin
            cef_platform: macosx64
          - host: macos-latest
            target: aarch64-apple-darwin
            cef_platform: macosarm64

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: 缓存 Rust 编译产物
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpng-dev \
            ninja-build \
            ${{ matrix.settings.cross_pkg }}

      # ── macOS 系统依赖 ──────────────────────────────────────────
      - name: 安装 macOS 系统依赖
        if: runner.os == 'macOS'
        run: brew install ninja libpng

      # ── Node.js 依赖 ───────────────────────────────────────────
      - name: 安装 Node.js 依赖
        run: pnpm install --frozen-lockfile

      # ── CEF 缓存 + 构建 C++ Helper ─────────────────────────────
      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.settings.cef_platform }}/cef
          key: cef-${{ matrix.settings.cef_platform }}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: pnpm run setup -- --target=${{ matrix.settings.target }}
        shell: bash
        env:
          CC:  ${{ matrix.settings.cross_cc }}
          CXX: ${{ matrix.settings.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: pnpm run setup:cpp -- --target=${{ matrix.settings.target }}
        shell: bash
        env:
          CC:  ${{ matrix.settings.cross_cc }}
          CXX: ${{ matrix.settings.cross_cxx }}

      # ── 构建 Rust Napi 绑定 ────────────────────────────────────
      - name: 构建 Rust Napi 绑定
        run: pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --js cef-screenshot.cjs
        shell: bash

      # ── 上传产物 ───────────────────────────────────────────────
      - name: 上传 .node 产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error
