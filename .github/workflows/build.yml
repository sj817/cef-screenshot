# CI 构建检查 — 验证各平台可以正常编译
# 触发条件：推送到 main / PR / 手动触发 / 被 release.yml 调用

name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - LICENSE
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── Windows ────────────────────────────────────────────────
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cef_platform: windows64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cef_platform: windowsarm64

          # ── Linux ──────────────────────────────────────────────────
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cef_platform: linux64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            cef_platform: linuxarm64
          - host: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++
            cross_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cross_arch: arm

          # ── macOS ──────────────────────────────────────────────────
          - host: macos-latest
            target: x86_64-apple-darwin
            cef_platform: macosx64
          - host: macos-latest
            target: aarch64-apple-darwin
            cef_platform: macosarm64

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: 缓存 Rust 编译产物
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev ninja-build ${{ matrix.settings.cross_pkg }}
          # 输出交叉编译器版本用于诊断
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            echo "--- Cross compiler versions ---"
            ${{ matrix.settings.cross_cc }} --version
            ${{ matrix.settings.cross_cxx }} --version
          fi

      # ── Linux ARM 交叉编译 libpng ────────────────────────────────
      - name: 构建交叉编译 libpng（Linux ARM）
        if: matrix.settings.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          # 1) 交叉编译 zlib（libpng 依赖）
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          CC=${{ matrix.settings.cross_cc }} ./configure --prefix=/tmp/libpng-cross --static
          make -j$(nproc)
          make install
          cd ..
          # 2) 交叉编译 libpng
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.settings.cross_cc }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.settings.cross_arch }} \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-cross \
            -DCMAKE_PREFIX_PATH=/tmp/libpng-cross \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF -DPNG_SHARED=OFF
          cmake --build build
          cmake --install build

      # ── macOS 系统依赖 ──────────────────────────────────────────
      - name: 安装 macOS 系统依赖
        if: runner.os == 'macOS'
        run: |
          for pkg in ninja libpng; do
            brew list "$pkg" &>/dev/null || brew install "$pkg"
          done

      # ── macOS x86_64 交叉编译 libpng ────────────────────────────
      - name: 构建 x86_64 libpng（macOS 交叉编译）
        if: matrix.settings.target == 'x86_64-apple-darwin'
        run: |
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-x86_64 \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF
          cmake --build build
          cmake --install build

      # ── Node.js 依赖 ───────────────────────────────────────────
      - name: 安装 Node.js 依赖
        run: pnpm install --frozen-lockfile

      # ── CEF 缓存 + 构建 C++ Helper ─────────────────────────────
      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.settings.cef_platform }}/cef
          key: cef-${{ matrix.settings.cef_platform }}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup:cpp -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 输出构建错误（失败时）
        if: failure()
        run: |
          echo "## 构建日志（最后 200 行）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/cef-build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # 同时创建一个包含错误日志的 gist（可通过 API 公开获取）
          echo "=== Last 50 lines of build log ==="
          tail -50 /tmp/cef-build.log 2>/dev/null || echo "No build log found"
          # 将关键错误行输出为 GitHub 注解
          if [ -f /tmp/cef-build.log ]; then
            grep -i "error\|fatal\|failed\|undefined reference\|no such file" /tmp/cef-build.log | tail -20 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
        shell: bash

      - name: 上传构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.settings.target }}
          path: /tmp/cef-build.log
          if-no-files-found: ignore

      # ── 构建 Rust Napi 绑定 ────────────────────────────────────
      - name: 构建 Rust Napi 绑定
        run: |
          # 设置 Linux 交叉编译链接器
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            target_env=$(echo "${{ matrix.settings.target }}" | tr - _)
            export "CC_${target_env}=${{ matrix.settings.cross_cc }}"
            export "CXX_${target_env}=${{ matrix.settings.cross_cxx }}"
            export "CARGO_TARGET_$(echo $target_env | tr '[:lower:]' '[:upper:]')_LINKER=${{ matrix.settings.cross_cc }}"
          fi
          pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --js cef-screenshot.cjs
        shell: bash

      # ── 上传产物 ───────────────────────────────────────────────
      - name: 上传 .node 产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error
