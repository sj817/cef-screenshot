# 发布工作流 — 推送 v* 标签时自动构建并发布到 npm
#
# 使用 napi-rs 标准发布流程：
#   1. 多平台矩阵构建所有 .node 绑定
#   2. napi create-npm-dirs → napi artifacts → npm publish
#   3. npm publish 触发 prepublishOnly (napi prepublish) 自动发布所有平台子包
#
# 使用前提：
#   1. 在 GitHub 仓库 Settings > Secrets 中设置 NPM_TOKEN
#   2. npm 包名未被占用
#
# 发布流程：
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. 多平台矩阵构建
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── Windows ────────────────────────────────────────────────
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cef_platform: windows64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cef_platform: windowsarm64

          # ── Linux ──────────────────────────────────────────────────
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cef_platform: linux64
          - host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            cef_platform: linuxarm64
            cross_cc: aarch64-linux-gnu-gcc
            cross_cxx: aarch64-linux-gnu-g++
            cross_pkg: gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          - host: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++
            cross_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

          # ── macOS ──────────────────────────────────────────────────
          - host: macos-13
            target: x86_64-apple-darwin
            cef_platform: macosx64
          - host: macos-latest
            target: aarch64-apple-darwin
            cef_platform: macosarm64

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: 缓存 Rust 编译产物
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpng-dev \
            ninja-build \
            ${{ matrix.settings.cross_pkg }}

      # ── macOS 系统依赖 ──────────────────────────────────────────
      - name: 安装 macOS 系统依赖
        if: runner.os == 'macOS'
        run: brew install ninja libpng

      # ── Node.js 依赖 ───────────────────────────────────────────
      - name: 安装 Node.js 依赖
        run: pnpm install --frozen-lockfile

      # ── CEF 缓存 + 构建 C++ Helper ─────────────────────────────
      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.settings.cef_platform }}/cef
          key: cef-${{ matrix.settings.cef_platform }}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: pnpm run setup -- --target=${{ matrix.settings.target }}
        shell: bash
        env:
          CC:  ${{ matrix.settings.cross_cc }}
          CXX: ${{ matrix.settings.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: pnpm run setup:cpp -- --target=${{ matrix.settings.target }}
        shell: bash
        env:
          CC:  ${{ matrix.settings.cross_cc }}
          CXX: ${{ matrix.settings.cross_cxx }}

      # ── 构建 Rust Napi 绑定 ────────────────────────────────────
      - name: 构建 Rust Napi 绑定
        run: pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --js cef-screenshot.cjs
        shell: bash

      # ── 打包 CEF 运行时归档 ────────────────────────────────────
      - name: 打包 CEF 运行时归档
        run: pnpm run pack:runtime -- --target=${{ matrix.settings.target }}
        shell: bash

      # ── 上传产物 ───────────────────────────────────────────────
      - name: 上传 .node 产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: "*.node"
          if-no-files-found: error

      - name: 上传 CEF 运行时归档
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.settings.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # 2. 创建 GitHub Release 并上传所有 CEF 运行时
  # ─────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: dist/
          merge-multiple: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────────
  # 3. 发布 npm 包（主包 + 所有平台子包）
  #    napi prepublish 在 prepublishOnly 中自动发布所有子包
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 创建 npm 子包目录
        run: pnpm exec napi create-npm-dirs

      - name: 下载所有 .node 产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*

      - name: 移动产物到 npm 子包
        run: pnpm exec napi artifacts

      - name: 列出 npm 子包内容
        run: ls -R ./npm
        shell: bash

      - name: 发布到 npm
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          npm publish --provenance --access public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
