# 发布工作流 — 推送 v* 标签时自动构建并发布到 npm
#
# 使用 napi-rs 标准发布流程：
#   1. 多平台矩阵构建所有 .node 绑定
#   2. napi create-npm-dirs → napi artifacts → npm publish
#   3. npm publish 触发 prepublishOnly (napi prepublish) 自动发布所有平台子包
#
# 使用前提：
#   1. 在 GitHub 仓库 Settings > Secrets 中设置 NPM_TOKEN
#   2. npm 包名未被占用
#
# 发布流程：
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CEF_VERSION: "146.0.7+ga6b143f+chromium-146.0.7680.165"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. 多平台矩阵构建
  # ─────────────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ── Windows ────────────────────────────────────────────────
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cef_platform: windows64
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            cef_platform: windowsarm64

          # ── Linux ──────────────────────────────────────────────────
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            cef_platform: linux64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            cef_platform: linuxarm64
          - host: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
            cef_platform: linuxarm
            cross_cc: arm-linux-gnueabihf-gcc
            cross_cxx: arm-linux-gnueabihf-g++
            cross_pkg: gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
            cross_arch: arm

          # ── macOS ──────────────────────────────────────────────────
          - host: macos-latest
            target: x86_64-apple-darwin
            cef_platform: macosx64
          - host: macos-latest
            target: aarch64-apple-darwin
            cef_platform: macosarm64

    name: Build ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: 缓存 Rust 编译产物
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.settings.target }}

      # ── Linux 系统依赖 ──────────────────────────────────────────
      - name: 安装 Linux 系统依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev ninja-build ${{ matrix.settings.cross_pkg }}
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            echo "--- Cross compiler versions ---"
            ${{ matrix.settings.cross_cc }} --version
            ${{ matrix.settings.cross_cxx }} --version
          fi

      # ── Linux ARM 交叉编译 libpng ────────────────────────────────
      - name: 构建交叉编译 libpng（Linux ARM）
        if: matrix.settings.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          # 1) 交叉编译 zlib（libpng 依赖）
          curl -sL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz | tar xz
          cd zlib-1.3.1
          CC=${{ matrix.settings.cross_cc }} ./configure --prefix=/tmp/libpng-cross --static
          make -j$(nproc)
          make install
          cd ..
          # 2) 交叉编译 libpng
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=${{ matrix.settings.cross_cc }} \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.settings.cross_arch }} \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-cross \
            -DCMAKE_PREFIX_PATH=/tmp/libpng-cross \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF -DPNG_SHARED=OFF
          cmake --build build
          cmake --install build

      # ── macOS 系统依赖 ──────────────────────────────────────────
      - name: 安装 macOS 系统依赖
        if: runner.os == 'macOS'
        run: |
          for pkg in ninja libpng; do
            brew list "$pkg" &>/dev/null || brew install "$pkg"
          done

      # ── macOS x86_64 交叉编译 libpng ────────────────────────────
      - name: 构建 x86_64 libpng（macOS 交叉编译）
        if: matrix.settings.target == 'x86_64-apple-darwin'
        run: |
          curl -sL "https://download.sourceforge.net/libpng/libpng-1.6.44.tar.xz" | tar xJ
          cd libpng-1.6.44
          cmake -B build -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/libpng-x86_64 \
            -DPNG_TESTS=OFF -DPNG_TOOLS=OFF
          cmake --build build
          cmake --install build

      # ── Node.js 依赖 ───────────────────────────────────────────
      - name: 安装 Node.js 依赖
        run: pnpm install --frozen-lockfile

      # ── CEF 缓存 + 构建 C++ Helper ─────────────────────────────
      - name: 缓存 CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/${{ matrix.settings.cef_platform }}/cef
          key: cef-${{ matrix.settings.cef_platform }}-${{ env.CEF_VERSION }}

      - name: 下载 CEF 并构建 C++ 辅助进程
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 仅构建 C++ 辅助进程（使用缓存 CEF）
        if: steps.cache-cef.outputs.cache-hit == 'true'
        run: |
          [[ -n "$CROSS_CC" ]] && export CC="$CROSS_CC" CXX="$CROSS_CXX"
          pnpm run setup:cpp -- --target=${{ matrix.settings.target }} 2>&1 | tee /tmp/cef-build.log
        shell: bash
        env:
          CROSS_CC:  ${{ matrix.settings.cross_cc }}
          CROSS_CXX: ${{ matrix.settings.cross_cxx }}

      - name: 输出构建错误（失败时）
        if: failure()
        run: |
          echo "## 构建日志（最后 200 行）" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/cef-build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No build log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # 将关键错误行输出为 GitHub 注解
          if [ -f /tmp/cef-build.log ]; then
            grep -i "error\|fatal\|failed\|undefined reference\|no such file" /tmp/cef-build.log | tail -20 | while IFS= read -r line; do
              echo "::error::$line"
            done
          fi
        shell: bash

      - name: 上传构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.settings.target }}
          path: /tmp/cef-build.log
          if-no-files-found: ignore

      # ── 构建 Rust Napi 绑定 ────────────────────────────────────
      - name: 构建 Rust Napi 绑定
        run: |
          if [ -n "${{ matrix.settings.cross_cc }}" ]; then
            target_env=$(echo "${{ matrix.settings.target }}" | tr - _)
            export "CC_${target_env}=${{ matrix.settings.cross_cc }}"
            export "CXX_${target_env}=${{ matrix.settings.cross_cxx }}"
            export "CARGO_TARGET_$(echo $target_env | tr '[:lower:]' '[:upper:]')_LINKER=${{ matrix.settings.cross_cc }}"
          fi
          pnpm exec napi build --platform --release --target ${{ matrix.settings.target }} --js false
        shell: bash

      # ── 编译 TypeScript 入口文件 ────────────────────────────
      - name: 编译 TypeScript 入口文件
        run: pnpm exec tsc -p tsconfig.build.json
        shell: bash

      # ── 打包 CEF 运行时归档 ────────────────────────────────────
      - name: 打包 CEF 运行时归档
        run: pnpm run pack:runtime -- --target=${{ matrix.settings.target }}
        shell: bash

      # ── 上传产物 ───────────────────────────────────────────────
      - name: 上传 .node 产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            index.js
            index.d.ts
          if-no-files-found: error

      - name: 上传 CEF 运行时归档
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.settings.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # 2. 创建 GitHub Release 并上传所有 CEF 运行时
  # ─────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 下载所有 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: dist/
          merge-multiple: true

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  # ─────────────────────────────────────────────────────────────────────────
  # 3. 发布 npm 包（主包 + 所有平台子包）
  #    napi prepublish 在 prepublishOnly 中自动发布所有子包
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 下载所有 .node 产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*

      - name: 移动产物到 npm 子包
        run: pnpm exec napi artifacts

      - name: 下载所有 CEF 运行时归档
        uses: actions/download-artifact@v4
        with:
          pattern: runtime-*
          path: runtime-artifacts/
          merge-multiple: true

      - name: 解压 CEF 运行时到 npm 子包
        shell: bash
        run: |
          echo "=== 可用的运行时归档 ==="
          ls -lh runtime-artifacts/
          for tarball in runtime-artifacts/*.tar.gz; do
            basename=$(basename "$tarball")
            # 从文件名提取平台后缀：cef-screenshot-runtime-{suffix}-v{version}.tar.gz
            suffix=$(echo "$basename" | sed 's/cef-screenshot-runtime-//;s/-v[0-9].*//')
            target_dir="npm/${suffix}"
            if [ -d "$target_dir" ]; then
              echo "解压 $basename → $target_dir/"
              tar -xzf "$tarball" -C "$target_dir"
              echo "  文件数: $(find "$target_dir" -type f | wc -l)"
              echo "  总大小: $(du -sh "$target_dir" | cut -f1)"
            else
              echo "::warning::找不到目标目录 $target_dir（需要 $suffix）"
            fi
          done
          echo ""
          echo "=== npm 子包包含的文件 ==="
          for d in npm/*/; do
            echo "--- $d ---"
            ls -lh "$d" | head -15
            file_count=$(find "$d" -type f | wc -l)
            [ "$file_count" -gt 15 ] && echo "  ... 共 $file_count 个文件"
          done

      - name: 列出 npm 子包内容
        run: ls -R ./npm
        shell: bash

      - name: 检查 npm 认证
        run: |
          echo "=== Node & npm 版本 ==="
          node -v
          npm -v
          echo "=== .npmrc 内容 ==="
          cat .npmrc
          echo "=== npm whoami ==="
          npm whoami 2>&1 || echo "::warning::npm whoami failed — 请检查 NPM_TOKEN 是否正确"
          echo "=== npm config list ==="
          npm config list
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 运行 napi prepublish（发布子包）
        shell: bash
        run: |
          echo "=== napi 版本 ==="
          pnpm exec napi --version || echo "::error::napi not found"
          echo "=== 开始 napi prepublish ==="
          output=$(pnpm exec napi prepublish -t npm --skip-gh-release 2>&1) || {
            exitcode=$?
            echo "::error::napi prepublish failed (exit $exitcode): $(echo "$output" | tail -30 | tr '\n' ' | ')"
            echo "$output"
            exit $exitcode
          }
          echo "$output"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 编译 TypeScript 入口文件
        run: pnpm exec tsc -p tsconfig.build.json
        shell: bash

      - name: 发布主包到 npm
        run: |
          set -eux
          npm publish --access public --ignore-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
